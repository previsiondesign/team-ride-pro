# .github/workflows/attendance-poll.yml
# Automated Slack attendance polls for Tam High MTB TeamRide Pro
#
# Runs hourly during 9 AM – 9 PM Pacific. Each run calls both:
#   1. post_poll_if_due — posts poll at configured day+time before practice
#   2. send_reminders   — DMs non-responders at configured day+time before practice
# Both actions self-gate: they only fire when the current Pacific hour matches
# the configured schedule in season_settings, so extra calls are harmless.
#
# Manual trigger available via workflow_dispatch (Actions tab → Run workflow).
#
# Requires these GitHub repo secrets:
#   SUPABASE_FUNCTION_URL — e.g. https://kweharxfvvjwrnswrooo.supabase.co/functions/v1/slack-attendance
#   CRON_SECRET           — must match the CRON_SECRET in Supabase edge function secrets

name: Attendance Poll

on:
  schedule:
    - cron: '0 16-23 * * *'  # Hourly 9 AM – 4 PM Pacific (UTC 16-23)
    - cron: '0 0-4 * * *'    # Hourly 5 PM – 9 PM Pacific (UTC 0-4)
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run'
        required: true
        default: 'post_poll_if_due'
        type: choice
        options:
          - post_poll_if_due
          - post_poll
          - send_reminders
          - import_coach_availability
          - cleanup_duplicate_rides
          - run_migrations

jobs:
  attendance:
    runs-on: ubuntu-latest
    steps:
      - name: Determine actions
        id: action
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "actions=${{ github.event.inputs.action }}" >> $GITHUB_OUTPUT
          else
            # Scheduled run — call both self-gating actions
            echo "actions=post_poll_if_due,send_reminders" >> $GITHUB_OUTPUT
          fi

      - name: Run actions
        run: |
          IFS=',' read -ra ACTIONS <<< "${{ steps.action.outputs.actions }}"
          for ACTION in "${ACTIONS[@]}"; do
            echo "--- Calling edge function with action: $ACTION ---"
            RESPONSE=$(curl -s -w "\n%{http_code}" \
              -X POST "${{ secrets.SUPABASE_FUNCTION_URL }}" \
              -H "Content-Type: application/json" \
              -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
              -d "{\"action\": \"$ACTION\"}")
            HTTP_CODE=$(echo "$RESPONSE" | tail -1)
            BODY=$(echo "$RESPONSE" | head -n -1)
            echo "HTTP $HTTP_CODE"
            echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
            if [ "$HTTP_CODE" -ge 400 ]; then
              echo "::error::$ACTION failed with HTTP $HTTP_CODE"
              exit 1
            fi
          done
