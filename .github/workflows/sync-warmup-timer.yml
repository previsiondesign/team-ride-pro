# Copies warmup timer files to tamhighmtb/timers/ so they're available at
# teamridepro.com/tamhighmtb/timers/exchequer-warmup.html
# teamridepro.com/tamhighmtb/timers/sixsigma-warmup.html
name: Sync warmup timer

on:
  push:
    branches: [main]
    paths:
      - 'utilities/warmup timer/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Copy warmup timer files
        run: |
          mkdir -p tamhighmtb/timers
          cp "utilities/warmup timer/warmup-timer.html" tamhighmtb/timers/exchequer-warmup.html
          cp "utilities/warmup timer/sixsigma-warmup.html" tamhighmtb/timers/sixsigma-warmup.html
          cp "utilities/warmup timer/service-worker.js" tamhighmtb/timers/service-worker.js
          cp "utilities/warmup timer/manifest.json" tamhighmtb/timers/manifest.json
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add tamhighmtb/timers/
          git diff --cached --quiet || git commit -m "Sync warmup timer files from source"
          git push
