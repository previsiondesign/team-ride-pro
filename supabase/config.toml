# Allow unauthenticated access to send-verification-code
# (called from login page before user is authenticated)
[functions.send-verification-code]
verify_jwt = false

# Allow unauthenticated access to send-admin-access-request
# (used from the login page by users who don't have an account yet)
[functions.send-admin-access-request]
verify_jwt = false

# Allow unauthenticated GET for "Approve from email" link (one-time token in URL)
[functions.approve-admin-request]
verify_jwt = false

# Slack attendance: slash commands, button interactions, and cron triggers
# Auth is handled via Slack signing secret / cron secret, not JWT
[functions.slack-attendance]
verify_jwt = false
